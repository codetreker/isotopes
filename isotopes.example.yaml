# Isotopes v2 Example Configuration
# Copy to ~/.isotopes/isotopes.yaml and customize

# =============================================================================
# PROVIDER - Default LLM provider for all agents
# =============================================================================
provider:
  type: anthropic              # anthropic | openai | anthropic-proxy
  model: claude-sonnet-4-20250514
  apiKey: ${ANTHROPIC_API_KEY}
  # For proxy providers:
  # baseUrl: https://your-proxy.example.com

# =============================================================================
# TOOLS - Tool permissions and guards
# =============================================================================
tools:
  cli: false                   # CLI/shell execution (default: off for safety)
  fs:
    workspaceOnly: true        # Restrict file tools to agent workspace

# =============================================================================
# COMPACTION - Context window management (M1)
# =============================================================================
compaction:
  mode: safeguard              # off | safeguard | aggressive
  contextWindow: 100000        # Max tokens before compaction triggers
  threshold: 0.8               # Trigger at 80% of context window

# =============================================================================
# SANDBOX - Secure code execution (M6)
# =============================================================================
sandbox:
  mode: off                    # off | non-main | all
  workspaceAccess: rw          # rw | ro
  docker:
    image: node:20-slim
    network: bridge            # bridge | host | none
    memoryLimit: 512m
    cpuLimit: 1.0

# =============================================================================
# SESSION - Session management and persistence
# =============================================================================
session:
  ttl: 86400                   # Session TTL in seconds (default: 24h)
  cleanupInterval: 3600        # Cleanup interval in seconds (default: 1h)

# =============================================================================
# AGENTS - Agent definitions
# =============================================================================
agents:
  - id: assistant
    name: Assistant
    systemPrompt: You are a helpful AI assistant.
    workspacePath: ./workspaces/assistant
    # Per-agent overrides (optional):
    # tools:
    #   cli: true
    # compaction:
    #   mode: aggressive
    # sandbox:
    #   mode: docker
    # provider:
    #   type: openai
    #   model: gpt-4o
    #   apiKey: ${OPENAI_API_KEY}

# =============================================================================
# DISCORD - Discord transport (M2)
# =============================================================================
discord:
  tokenEnv: DISCORD_TOKEN      # Environment variable containing bot token
  defaultAgentId: assistant
  allowDMs: true
  # Bind existing Discord threads to ACP sessions:
  # threadBindings:
  #   enabled: true
  #   spawnAcpSessions: true
  # Multi-bot routing:
  # agentBindings:
  #   "bot-user-id-1": assistant
  #   "bot-user-id-2": coder
  # Channel allowlist (empty = all channels):
  # channelAllowlist:
  #   - "channel-id-1"

# =============================================================================
# FEISHU - Feishu/Lark transport (M2)
# =============================================================================
# feishu:
#   appId: ${FEISHU_APP_ID}
#   appSecret: ${FEISHU_APP_SECRET}
#   defaultAgentId: assistant

# =============================================================================
# ACP - Agent Communication Protocol (M3)
# =============================================================================
acp:
  enabled: false
  backend: claude-code         # acpx | claude-code | codex
  defaultAgent: assistant
  allowedAgents:               # Agents allowed to spawn ACP sessions
    - assistant

# =============================================================================
# CRON - Scheduled tasks (M4)
# =============================================================================
# cron:
#   - name: daily-report
#     expression: "0 9 * * *"  # 9 AM daily
#     agentId: assistant
#     action:
#       type: prompt
#       prompt: "Generate daily report"
#   - name: weekly-cleanup
#     expression: "0 0 * * 0"  # Midnight on Sunday
#     agentId: assistant
#     action:
#       type: prompt
#       prompt: "Clean up old sessions"

# =============================================================================
# API - REST API server (M5)
# =============================================================================
api:
  port: 3000
  host: 127.0.0.1
