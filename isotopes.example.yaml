# Isotopes Example Configuration
# Copy to isotopes.yaml and customize

# Default provider for all agents
provider:
  type: anthropic
  model: claude-sonnet-4-20250514
  apiKey: ${ANTHROPIC_API_KEY}

# Tool guards and defaults
tools:
  # CLI/shell execution is off by default.
  cli: false
  fs:
    # Restrict file tools to the agent workspace by default.
    workspaceOnly: true

# Agent definitions
agents:
  - id: assistant
    name: Assistant
    systemPrompt: You are a helpful AI assistant.
    workspacePath: ./workspaces/assistant
    # Optional: enable CLI/shell for a specific agent
    # tools:
    #   cli: true
    # Optional: override provider per agent
    # provider:
    #   type: openai
    #   model: gpt-4o
    #   apiKey: ${OPENAI_API_KEY}

# Discord transport (optional)
discord:
  tokenEnv: DISCORD_TOKEN
  defaultAgentId: assistant
  # Map bot user IDs to agents for multi-agent routing
  # agentBindings:
  #   "123456789": assistant
  allowDMs: true
  # Limit to specific channels (empty = all)
  # channelAllowlist:
  #   - "channel-id-1"
  #   - "channel-id-2"
