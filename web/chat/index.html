<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isotopes Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-wrapper">
    <aside class="session-sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Sessions</span>
        <button id="new-chat-btn" class="btn-new-chat" title="New conversation">+ New Chat</button>
      </div>
      <div id="session-list" class="session-list"></div>
    </aside>
    <div class="chat-container">
      <header class="chat-header">
        <div class="header-left">
          <span class="logo">Isotopes</span>
          <span class="header-sep">|</span>
          <span class="header-label">Chat</span>
        </div>
        <div class="header-right">
          <label for="agent-select" class="agent-label">Agent</label>
          <select id="agent-select" class="agent-select"></select>
        </div>
      </header>
      <div id="readonly-banner" class="readonly-banner" style="display:none">
        This is an ACP session. Messages are read-only.
      </div>
      <div id="messages" class="messages"></div>
      <div id="input-area" class="input-area">
        <textarea id="input" class="input-box" placeholder="Type a message..." rows="1"></textarea>
        <button id="send-btn" class="send-btn" disabled>Send</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
